<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Awis' Garden - The Alchemy Update - Pink Edition</title>
    <style>
        /* ==========================================================================
           1. ESTILOS BASE Y MODERN-RETRO UI (Paleta Rosa)
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        body { 
            margin: 0; background: #050505; color: #fff; 
            font-family: 'VT323', monospace; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            user-select: none;
        }

        #game-container {
            position: relative; width: 800px; height: 600px;
            box-shadow: 0 0 50px rgba(194, 24, 91, 0.2); /* Sombra rosa */
            border: 4px solid #3e1a2d; /* Borde oscuro rosa */
            border-radius: 8px; overflow: hidden;
        }

        canvas { image-rendering: pixelated; display: block; background: #000; cursor: crosshair; }

        /* --- MENÚ PRINCIPAL (Rosa y Decorativo) --- */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 10, 0.9); /* Fondo oscuro con tinte rosa */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.5s ease; backdrop-filter: blur(6px);
        }

        #menu-decor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .decor-vine {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(121, 85, 72, 0.2) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(121, 85, 72, 0.2) 25%, transparent 25%);
            background-size: 64px 64px;
            background-position: 0 0, 32px 32px;
            opacity: 0.3;
        }

        .title-container { 
            text-align: center; margin-bottom: 40px; animation: float 4s ease-in-out infinite; 
            position: relative; z-index: 10;
        }
        h1 {
            font-family: 'Press Start 2P', cursive; font-size: 36px;
            color: #F8BBD0;
            text-shadow: 0 0 20px #F8BBD0, 4px 4px 0px #880E4F;
            margin: 0 0 10px 0;
        }
        .subtitle { color: #F06292; font-size: 24px; letter-spacing: 2px; }

        #save-slots-container { display: flex; gap: 20px; position: relative; z-index: 10; }
        .save-slot {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #F8BBD0;
            border-radius: 8px; width: 180px; padding: 15px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(194, 24, 91, 0.2);
        }
        .save-slot:hover { 
            background: rgba(194, 24, 91, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(248, 187, 208, 0.4);
        }
        .slot-title { font-family: 'Press Start 2P'; font-size: 10px; margin-bottom: 10px; color: #fff; }
        .btn-delete {
            margin-top: 10px; background: #d32f2f; color: white; border: none; padding: 4px 8px; font-family: 'VT323'; cursor: pointer; border-radius: 4px; display: none;
        }
        .save-slot:hover .btn-delete { display: inline-block; }

        /* --- UI DEL JUEGO --- */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .hud-top { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 15px; border: 2px solid #4CAF50; border-radius: 8px; pointer-events: auto; min-width: 200px; }
        .xp-bar-bg { width: 100%; height: 8px; background: #222; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.3s; }

        #quest-board {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 20, 10, 0.9); border: 2px solid #cd853f; padding: 10px 20px; border-radius: 4px; pointer-events: auto; text-align: center; min-width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .quest-title { font-family: 'Press Start 2P'; font-size: 10px; color: #ffcc80; margin-bottom: 5px; }
        .quest-desc { font-size: 18px; color: #fff; }

        .hud-right { position: absolute; top: 15px; right: 15px; text-align: right; pointer-events: auto; }
        .controls-hint {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 16px; color: #aaa; border: 1px solid #333;
        }

        /* --- BARRA DE INVENTARIO --- */
        #inventory-bar {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 2px solid #555; pointer-events: auto;
        }
        .inv-slot {
            width: 40px; height: 40px; background: #222; border: 2px solid #444; border-radius: 4px; display: flex; justify-content: center; align-items: center; position: relative; font-family: 'VT323'; font-size: 16px; color: white; transition: all 0.2s;
        }
        .inv-slot .count { position: absolute; bottom: -5px; right: -5px; background: #4CAF50; color: #000; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-weight: bold; border: 2px solid #000; }
        .inv-slot .label { position: absolute; top: -20px; font-size: 12px; color: #aaa; white-space: nowrap; display: none; }
        .inv-slot:hover .label { display: block; }

        /* --- MENÚ DE CRAFTEO Y TIENDA --- */
        #crafting-menu, #shop-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 10, 0.90); z-index: 150;
            display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto;
        }
        .crafting-container { 
            background: #e8d5a5; 
            border: 8px solid #5c4033; 
            border-radius: 4px; padding: 30px; width: 600px; max-height: 450px; overflow-y: auto; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.8);
        }
        .craft-title { 
            font-family: 'Press Start 2P'; color: #3e2723; text-align: center; margin-bottom: 20px; 
            text-shadow: 2px 2px #bcaaa4; border-bottom: 4px solid #8d6e63; padding-bottom: 15px;
        }
        .recipe-card {
            background: #efebe9; border: 2px dashed #8d6e63; padding: 15px; margin-bottom: 15px; 
            border-radius: 2px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s;
        }
        .recipe-card:hover { border-style: solid; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .recipe-info h3 { margin: 0 0 5px 0; color: #2e7d32; font-size: 24px; text-shadow: 1px 1px #ccc; }
        .recipe-info p { margin: 0; color: #4e342e; font-size: 18px; }
        .recipe-req { margin-top: 10px; color: #d84315; font-size: 16px; font-weight: bold; }
        .btn-craft { 
            background: #4caf50; color: white; border: 2px solid #2e7d32; padding: 12px 20px; 
            font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; border-radius: 4px; transition: background 0.2s; box-shadow: 2px 2px 0px #1b5e20;
        }
        .btn-craft:hover { background: #66bb6a; transform: translate(-1px, -1px); box-shadow: 3px 3px 0px #1b5e20; }
        .btn-craft:disabled { background: #bcaaa4; border-color:#8d6e63; color: #795548; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-close-craft { 
            margin-top: 20px; background: #d32f2f; color: white; border: 2px solid #b71c1c; 
            padding: 10px 20px; font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer; border-radius: 4px; box-shadow: 2px 2px 0px #7f0000;
        }

        /* --- MENÚ PAUSA (Rosa) --- */
        #pause-menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; 
        }
        .pause-btn { 
            background: transparent; 
            border: 2px solid #F48FB1;
            color: #F48FB1;
            font-family: 'Press Start 2P'; font-size: 16px; padding: 15px 30px; margin: 10px; cursor: pointer; width: 300px; 
            transition: all 0.2s;
        }
        .pause-btn:hover { 
            background: #F48FB1;
            color: #000;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-ui">
        <div class="hud-top">
            <div style="color: #4CAF50; font-size: 22px; display: flex; justify-content: space-between;">
                <span>NIVEL <span id="ui-lvl">1</span></span>

            <div class="xp-bar-bg"><div id="xp-fill"></div></div>
            <div style="color: #FFD700; font-size: 22px; margin-top: 10px;">FLORINS: <span id="ui-money">0</span></div>

            </div>

    <div id="main-menu">
        <div id="menu-decor">
            <div class="decor-vine"></div>
            <div style="position: absolute; top: 10px; left: 10px; font-size: 24px; color: #F06292;">✿</div>
            <div style="position: absolute; top: 10px; right: 10px; font-size: 24px; color: #F06292;">❀</div>
            <div style="position: absolute; bottom: 10px; left: 10px; font-size: 24px; color: #F06292;">❀</div>
            <div style="position: absolute; bottom: 10px; right: 10px; font-size: 24px; color: #F06292;">✿</div>
        </div>

        <div class="title-container">
            <h1>AWIS' GARDEN</h1>
            <div class="subtitle">BOTANICAL TYCOON - ALCHEMY</div>
        </div>
        <div id="save-slots-container"></div>
    </div>

    <canvas id="mainView"></canvas>
</div>

<script>
/**
 * ============================================================================
 * AWIS' GARDEN - ENGINE V8.1 (DAY & NIGHT UPDATE)
 * ============================================================================
 */

const ENUMS = {
    TOOLS: { HAND: 'MANO', HOE: 'AZADA', WATER: 'REGADERA', POTION: 'POCIÓN MAGICA', FERTILIZER: 'FERTILIZANTE', GOLD: 'TRANSMUTAR ORO' },
    PLANT_STATE: { SEED: 0, SPROUT: 1, GROWING: 2, MATURE: 3 },
    SCENE: { MENU: 'MENU', PLAY: 'PLAY', PAUSE: 'PAUSE', CRAFTING: 'CRAFTING', SHOP: 'SHOP' }
};

const DB = {
    PLANTS: {
        'ROSA': { id: 'ROSA', name: 'Rosa', color: '#ff4d4d', seedColor: '#5a2d2d', growthTime: 1.0, xp: 20, price: 15 },
        'LIRIO': { id: 'LIRIO', name: 'Lirio', color: '#ffffff', seedColor: '#4a4a4a', growthTime: 1.5, xp: 35, price: 30 },
        'ORQUIDEA': { id: 'ORQUIDEA', name: 'Orquídea', color: '#e066ff', seedColor: '#3a1a3d', growthTime: 3.0, xp: 100, price: 85 },
        'TULIPAN': { id: 'TULIPAN', name: 'Tulipán', color: '#ff9800', seedColor: '#5d4037', growthTime: 2.0, xp: 50, price: 45 },
        'GIRASOL': { id: 'GIRASOL', name: 'Girasol', color: '#ffeb3b', seedColor: '#333300', growthTime: 2.5, xp: 70, price: 60 }
    },
    RECIPES: {
        'POTION_GROWTH': { 
            id: 'POTION_GROWTH', name: 'Poción de Crecimiento', desc: 'Crece una semilla al 100% instantáneamente.',
            req: { 'ROSA': 2, 'LIRIO': 1 }, isItem: true
        },
        'SUPER_FERTILIZER': { 
            id: 'SUPER_FERTILIZER', name: 'Súper Fertilizante', desc: 'Riega la tierra eternamente.',
            req: { 'TULIPAN': 2, 'GIRASOL': 1 }, isItem: true
        },
        'GOLD_TRANSMUTE': { 
            id: 'GOLD_TRANSMUTE', name: 'Transmutación de Oro', desc: 'Usa esto [6] sobre una planta adulta para volverla 350 Florins.',
            req: { 'ORQUIDEA': 1, 'GIRASOL': 2, 'ROSA': 1 }, isItem: true 
        }
    },
    SHOP: {
        'PLOT': { id: 'PLOT', name: 'Parcela de Tierra', desc: 'Añade una zona cultivable.', price: 100, qty: 1 },
        'FENCE': { id: 'FENCE', name: 'Valla de Madera', desc: 'Decora tu granja (x3 unidades).', price: 400, qty: 3 }
    }
};

class SaveManager {
    static getSave(slotId) {
        const data = localStorage.getItem(`awis_save_${slotId}`);
        return data ? JSON.parse(data) : null;
    }
    static saveGame(slotId, gameState) {
        const serialized = {
            version: '8.1', timestamp: new Date().toLocaleString(),
            player: { ...gameState.player },
            world: {
                timeElapsed: gameState.world.timeElapsed, day: gameState.world.day,
                camera: { ...gameState.world.camera }, currentQuest: gameState.world.currentQuest
            },
            entities: gameState.world.entities.map(e => {
                if(e.type === 'PLOT') return { type: 'PLOT', x: e.x, y: e.y, tilled: e.tilled, water: e.water, plant: e.plant ? { id: e.plant.data.id, growth: e.plant.growth, state: e.plant.state } : null };
                if(e.type === 'SEED') return { type: 'SEED', x: e.x, y: e.y, plantId: e.plantId };
                if(e.type === 'WORKBENCH') return { type: 'WORKBENCH', x: e.x, y: e.y };
                if(e.type === 'SHOP') return { type: 'SHOP', x: e.x, y: e.y };
                if(e.type === 'FENCE') return { type: 'FENCE', x: e.x, y: e.y, rotation: e.rotation };
            }).filter(Boolean)
        };
        localStorage.setItem(`awis_save_${slotId}`, JSON.stringify(serialized));
    }
    static deleteSave(slotId, e) { e.stopPropagation(); if(confirm(`¿Borrar Juego ${slotId}?`)) { localStorage.removeItem(`awis_save_${slotId}`); UIController.renderSaveSlots(); } }
}

class SpriteLibrary {
    constructor() { this.lib = {}; this.generateAll(); }
    generateAll() {
        this.lib.grass = this.bake(32, 32, ctx => { ctx.fillStyle = '#2d5a27'; ctx.fillRect(0,0,32,32); ctx.fillStyle = '#24491f'; for(let i=0; i<8; i++) ctx.fillRect(Math.random()*28, Math.random()*28, 2, 2); });
        this.lib.dirt_dry = this.bake(32, 32, ctx => { ctx.fillStyle = '#5c4033'; ctx.fillRect(2,2,28,28); });
        this.lib.dirt_wet = this.bake(32, 32, ctx => { ctx.fillStyle = '#2b1d16'; ctx.fillRect(2,2,28,28); });
        
        this.lib.player = this.bake(32, 48, ctx => {
            ctx.fillStyle = '#3e2723'; ctx.fillRect(8, 2, 16, 14); 
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(10, 6, 12, 12); 
            ctx.fillStyle = '#c2185b'; ctx.fillRect(8, 18, 16, 22); 
            ctx.fillStyle = '#000'; ctx.fillRect(12, 10, 2, 2); ctx.fillRect(18, 10, 2, 2); 
        });

        this.lib.workbench = this.bake(64, 64, ctx => {
            ctx.fillStyle = '#5d4037'; ctx.fillRect(4, 20, 56, 30); 
            ctx.fillStyle = '#3e2723'; ctx.fillRect(8, 50, 8, 10); ctx.fillRect(48, 50, 8, 10); 
            ctx.fillStyle = '#8e24aa'; ctx.fillRect(15, 10, 10, 15); 
            ctx.fillStyle = '#00bfa5'; ctx.beginPath(); ctx.arc(45, 18, 8, 0, 7); ctx.fill(); 
        });

        this.lib.shop = this.bake(64, 64, ctx => {
            ctx.fillStyle = '#795548'; ctx.fillRect(8, 20, 48, 40); // Estructura
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.moveTo(4, 20); ctx.lineTo(32, 5); ctx.lineTo(60, 20); ctx.fill(); // Techo
            ctx.fillStyle = '#3e2723'; ctx.fillRect(20, 30, 24, 15); // Mostrador
            ctx.fillStyle = '#000'; ctx.fillRect(24, 35, 16, 10); // Sombra interior
            ctx.fillStyle = '#FF8C00'; ctx.beginPath(); ctx.arc(32, 12, 5, 0, 7); ctx.fill(); // Moneda logo
        });

        this.lib.fence = this.bake(32, 32, ctx => {
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(4, 8, 6, 24); // Poste izq
            ctx.fillRect(22, 8, 6, 24); // Poste der
            ctx.fillRect(0, 12, 32, 4); // Travesaño 1
            ctx.fillRect(0, 22, 32, 4); // Travesaño 2
        });
        
        Object.values(DB.PLANTS).forEach(p => {
            this.lib[`seed_${p.id}`] = this.bake(16, 16, ctx => { ctx.fillStyle = p.seedColor; ctx.beginPath(); ctx.arc(8, 8, 5, 0, 7); ctx.fill(); });
            this.lib[`flower_${p.id}`] = this.bake(32, 32, ctx => {
                ctx.fillStyle = '#2e7d32'; ctx.fillRect(14, 15, 4, 17);
                ctx.fillStyle = p.color;
                if(p.id === 'GIRASOL') { ctx.beginPath(); ctx.arc(16, 12, 10, 0, 7); ctx.fill(); ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.arc(16, 12, 4, 0, 7); ctx.fill(); }
                else if(p.id === 'LIRIO') { ctx.beginPath(); ctx.moveTo(16,2); ctx.lineTo(26,15); ctx.lineTo(6,15); ctx.fill(); }
                else { for(let i=0; i<6; i++) { ctx.beginPath(); ctx.arc(16 + Math.cos(i)*7, 12 + Math.sin(i)*7, 6, 0, 7); ctx.fill(); } }
            });
        });
    }
    bake(w, h, draw) { const c = document.createElement('canvas'); c.width = w; c.height = h; draw(c.getContext('2d')); return c; }
    get(id) { return this.lib[id] || this.lib.grass; }
}

class Particle {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 1) * 3 - 1;
        this.life = 1.0;
        this.color = type === 'WATER' ? (Math.random() > 0.5 ? '#00bfa5' : '#00d4ff') : 
                     type === 'GOLD'  ? (Math.random() > 0.5 ? '#FFD700' : '#FFA500') :
                     (Math.random() > 0.5 ? '#5c4033' : '#3e2723');
        this.size = Math.random() * 3 + 2;
    }
    update(dt) {
        this.x += this.vx * (dt/16);
        this.y += this.vy * (dt/16);
        this.vy += 0.2 * (dt/16);
        this.life -= 0.04 * (dt/16);
    }
    draw(ctx, cam) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - cam.x, this.y - cam.y, this.size, this.size);
        ctx.globalAlpha = 1.0;
    }
}

class SeedDrop {
    constructor(x, y, plantId) { this.type = 'SEED'; this.x = x; this.y = y; this.plantId = plantId; this.floating = Math.random() * 10; this.toDelete = false; }
    update(dt) { this.floating += 0.005 * dt; }
    draw(ctx, lib, cam) { ctx.drawImage(lib.get(`seed_${this.plantId}`), this.x - cam.x, this.y - cam.y + Math.sin(this.floating)*4); }
}

class Plant {
    constructor(typeData, growth = 0, state = ENUMS.PLANT_STATE.SEED) { this.data = typeData; this.growth = growth; this.state = state; }
    update(dt, water) {
        if(water > 0 && this.growth < 100) {
            this.growth += 0.004 * this.data.growthTime * (dt/16);
            if(this.growth > 30) this.state = ENUMS.PLANT_STATE.SPROUT;
            if(this.growth > 70) this.state = ENUMS.PLANT_STATE.GROWING;
            if(this.growth >= 100) this.state = ENUMS.PLANT_STATE.MATURE;
        }
    }
    draw(ctx, lib, cam, x, y) {
        if(this.state === ENUMS.PLANT_STATE.MATURE) ctx.drawImage(lib.get(`flower_${this.data.id}`), x - cam.x, y - cam.y - 12);
        else { ctx.fillStyle = '#4CAF50'; const h = (this.growth/100) * 12; ctx.fillRect(x - cam.x + 14, y - cam.y + 20 - h, 4, h); }
    }
}

class Plot {
    constructor(x, y) { this.type = 'PLOT'; this.x = x; this.y = y; this.tilled = false; this.water = 0; this.plant = null; this.toDelete = false; }
    update(dt) {
        if(this.water > 0) this.water = Math.max(0, this.water - 0.004 * (dt/16));
        if(this.plant) this.plant.update(dt, this.water);
    }
    draw(ctx, lib, cam) {
        // Ahora la parcela SÓLO dibuja la tierra. La planta se dibujará externamente usando el Y-Sorting
        ctx.drawImage(this.water > 10 ? lib.get('dirt_wet') : lib.get('dirt_dry'), this.x - cam.x, this.y - cam.y);
    }
}

class Workbench {
    constructor(x, y) { this.type = 'WORKBENCH'; this.x = x; this.y = y; this.toDelete = false; }
    update(dt) {}
    draw(ctx, lib, cam) { ctx.drawImage(lib.get('workbench'), this.x - cam.x, this.y - cam.y); }
}

class ShopBuilding {
    constructor(x, y) { this.type = 'SHOP'; this.x = x; this.y = y; this.toDelete = false; }
    update(dt) {}
    draw(ctx, lib, cam) { ctx.drawImage(lib.get('shop'), this.x - cam.x, this.y - cam.y); }
}

class Fence {
    constructor(x, y, rotation = 0) { this.type = 'FENCE'; this.x = x; this.y = y; this.rotation = rotation; this.toDelete = false; }
    update(dt) {}
    draw(ctx, lib, cam) { 
        ctx.save();
        ctx.translate(this.x - cam.x + 16, this.y - cam.y + 16);
        ctx.rotate((this.rotation * 90) * Math.PI / 180);
        ctx.drawImage(lib.get('fence'), -16, -16); 
        ctx.restore();
    }
}

class Engine {
    constructor() {
        this.canvas = document.getElementById('mainView'); this.ctx = this.canvas.getContext('2d');
        this.lib = new SpriteLibrary(); this.scene = ENUMS.SCENE.MENU; this.inputs = {}; this.lastTime = 0;
        this.mouseX = 0; this.mouseY = 0; this.placementItem = null; 
        this.placementRotation = 0; this.selectedPlot = null; this.isDraggingPlot = false; this.dragOriginalPos = {x:0, y:0};
        this.setupListeners(); UIController.renderSaveSlots();
        this.canvas.width = 800; this.canvas.height = 600;
        this.initWorld(true); requestAnimationFrame(t => this.loop(t));
    }

    setupListeners() {
        window.addEventListener('keydown', e => {
            this.inputs[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r' && this.placementItem === 'FENCE') {
                this.placementRotation = ((this.placementRotation || 0) + 1) % 4;
            }
        });
        window.addEventListener('keyup', e => this.inputs[e.key.toLowerCase()] = false);
        window.addEventListener('keypress', e => {
            if((this.scene === ENUMS.SCENE.CRAFTING || this.scene === ENUMS.SCENE.SHOP) && (e.key === 'e' || e.key === 'E')) { 
                UIController.closeCrafting(); UIController.closeShop(); return; 
            }
            if(this.scene !== ENUMS.SCENE.PLAY) return;
            
            if(e.key === '1') this.player.tool = ENUMS.TOOLS.HAND;
            if(e.key === '2') this.player.tool = ENUMS.TOOLS.HOE;
            if(e.key === '3') this.player.tool = ENUMS.TOOLS.WATER;
            if(e.key === '4') this.player.tool = ENUMS.TOOLS.POTION;
            if(e.key === '5') this.player.tool = ENUMS.TOOLS.FERTILIZER;
            if(e.key === '6') this.player.tool = ENUMS.TOOLS.GOLD;
            
            if(e.key === 'e' || e.key === ' ') this.interact();
            UIController.updateHUD();
        });

        this.canvas.addEventListener('mousemove', e => {
            const rect = this.canvas.getBoundingClientRect();
            this.mouseX = e.clientX - rect.left;
            this.mouseY = e.clientY - rect.top;

            if (this.isDraggingPlot && this.selectedPlot) {
                const cam = this.world.camera;
                const wx = this.mouseX + cam.x;
                const wy = this.mouseY + cam.y;
                this.selectedPlot.x = Math.floor(wx / 32) * 32;
                this.selectedPlot.y = Math.floor(wy / 32) * 32;
            }
        });

        this.canvas.addEventListener('mousedown', e => {
            if (e.button !== 0 || this.scene !== ENUMS.SCENE.PLAY) return;

            const cam = this.world.camera;
            const wx = this.mouseX + cam.x;
            const wy = this.mouseY + cam.y;

            if (this.placementItem) {
                this.placeStructure();
                return;
            }

            if (this.selectedPlot) {
                const px = this.selectedPlot.x;
                const py = this.selectedPlot.y;
                
                // Mover Parcela/Valla (M)
                if (wx >= px && wx <= px + 16 && wy >= py - 20 && wy <= py - 4) {
                    this.isDraggingPlot = true;
                    this.dragOriginalPos = { x: px, y: py };
                    return;
                }
                
                // Eliminar Parcela/Valla (X)
                if (wx >= px + 16 && wx <= px + 32 && wy >= py - 20 && wy <= py - 4) {
                    this.selectedPlot.toDelete = true;
                    const typeId = this.selectedPlot.type;
                    this.player.inventory[typeId] = (this.player.inventory[typeId] || 0) + 1;
                    this.selectedPlot = null;
                    
                    this.world.entities = this.world.entities.filter(ent => !ent.toDelete);
                    
                    UIController.notify(typeId === 'PLOT' ? "Parcela enviada al inventario" : "Valla enviada al inventario");
                    UIController.updateHUD();
                    return;
                }
            }

            let clickedPlot = null;
            for (let i = this.world.entities.length - 1; i >= 0; i--) {
                const ent = this.world.entities[i];
                if ((ent.type === 'PLOT' || ent.type === 'FENCE') && wx >= ent.x && wx < ent.x + 32 && wy >= ent.y && wy < ent.y + 32) {
                    clickedPlot = ent;
                    break;
                }
            }
            this.selectedPlot = clickedPlot;
        });

        window.addEventListener('mouseup', e => {
            if (this.isDraggingPlot && this.selectedPlot) {
                this.isDraggingPlot = false;
                
                const occupied = this.world.entities.some(ent => {
                    return ent !== this.selectedPlot && Math.abs(ent.x - this.selectedPlot.x) < 24 && Math.abs(ent.y - this.selectedPlot.y) < 24;
                });
                
                if (occupied) {
                    this.selectedPlot.x = this.dragOriginalPos.x;
                    this.selectedPlot.y = this.dragOriginalPos.y;
                    UIController.notify("Espacio bloqueado", true);
                } else {
                    UIController.notify(this.selectedPlot.type === 'PLOT' ? "Parcela movida exitosamente" : "Valla movida exitosamente");
                }
            }
        });
    }

    initWorld(isBackground = false) {
        this.player = { x: 400, y: 300, vx: 0, vy: 0, money: 0, level: 1, xp: 0, seeds: 5, tool: ENUMS.TOOLS.HAND, inventory: { 'PLOT': 3 } }; 
        this.world = { width: 1600, height: 1200, timeElapsed: 21600000, day: 1, camera: { x: 0, y: 0 }, entities: [], currentQuest: null };
        this.particles = []; 
        this.placementRotation = 0; this.selectedPlot = null; this.isDraggingPlot = false;
        
        if(isBackground) {
            for(let i=0; i<4; i++) this.world.entities.push(new Plot(350 + i*64, 300));
        }
        
        this.world.entities.push(new Workbench(350, 200));
        this.world.entities.push(new ShopBuilding(500, 180)); 

        if(isBackground) this.world.camera = { x: 250, y: 250 };
        this.generateQuest();
    }

    generateQuest() {
        const plants = Object.values(DB.PLANTS); const target = plants[Math.floor(Math.random() * plants.length)];
        const qty = 2 + Math.floor(Math.random() * 3) + this.player.level;
        this.world.currentQuest = { plantId: target.id, targetQty: qty, currentQty: 0, reward: qty * target.price * 2 };
    }

    checkLevelUp() {
        const nextXP = this.player.level * 150;
        if(this.player.xp >= nextXP) { this.player.level++; this.player.xp -= nextXP; UIController.notify(`¡NIVEL SUBIDO A ${this.player.level}!`); }
    }

    loadSave(slotId) {
        this.currentSlot = slotId; const data = SaveManager.getSave(slotId);
        this.particles = []; this.placementItem = null; this.selectedPlot = null;

        if(data) {
            this.player = data.player; this.player.inventory = this.player.inventory || {}; 
            this.world.timeElapsed = data.world.timeElapsed; this.world.day = data.world.day;
            this.world.camera = data.world.camera; this.world.currentQuest = data.world.currentQuest || this.world.currentQuest;
            this.world.entities = data.entities.map(e => {
                if(e.type === 'SEED') return new SeedDrop(e.x, e.y, e.plantId);
                if(e.type === 'WORKBENCH') return new Workbench(e.x, e.y);
                if(e.type === 'SHOP') return new ShopBuilding(e.x, e.y);
                if(e.type === 'FENCE') return new Fence(e.x, e.y, e.rotation || 0);
                const p = new Plot(e.x, e.y); p.tilled = e.tilled; p.water = e.water;
                if(e.plant) p.plant = new Plant(DB.PLANTS[e.plant.id], e.plant.growth, e.plant.state);
                return p;
            });
            if(!this.world.entities.find(e => e.type === 'WORKBENCH')) this.world.entities.push(new Workbench(350, 200));
            if(!this.world.entities.find(e => e.type === 'SHOP')) this.world.entities.push(new ShopBuilding(500, 180));
        } else { this.initWorld(false); }
        this.scene = ENUMS.SCENE.PLAY;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        UIController.updateHUD();
    }

    interact() {
        const px = this.player.x + 16, py = this.player.y + 24;
        let interactedUI = false;

        this.world.entities.forEach(ent => {
            const isLarge = ent.type === 'WORKBENCH' || ent.type === 'SHOP';
            const cx = ent.x + (isLarge ? 32 : 16);
            const cy = ent.y + (isLarge ? 32 : 16);
            const radius = isLarge ? 65 : 40;

            if(Math.hypot(px - cx, py - cy) < radius) {
                
                if(ent.type === 'WORKBENCH' && !interactedUI) {
                    UIController.openCrafting(); interactedUI = true; return;
                }
                
                if(ent.type === 'SHOP' && !interactedUI) {
                    UIController.openShop(); interactedUI = true; return;
                }

                if(ent.type === 'SEED') {
                    this.player.seeds++; ent.toDelete = true; UIController.notify("+1 Semilla Silvestre");
                } 
                else if(ent.type === 'PLOT') {
                    if(this.player.tool === ENUMS.TOOLS.HOE && !ent.tilled) {
                        ent.tilled = true;
                        for(let i=0; i<8; i++) this.particles.push(new Particle(ent.x + 16, ent.y + 16, 'DIRT'));
                        if(this.player.seeds > 0) {
                            const keys = Object.keys(DB.PLANTS); ent.plant = new Plant(DB.PLANTS[keys[Math.floor(Math.random()*keys.length)]]); this.player.seeds--;
                        }
                    }
                    else if(this.player.tool === ENUMS.TOOLS.HOE && ent.tilled && !ent.plant && this.player.seeds > 0) {
                        const keys = Object.keys(DB.PLANTS); ent.plant = new Plant(DB.PLANTS[keys[Math.floor(Math.random()*keys.length)]]); this.player.seeds--;
                    } 
                    else if(this.player.tool === ENUMS.TOOLS.WATER) { 
                        ent.water = 100;
                        for(let i=0; i<8; i++) this.particles.push(new Particle(ent.x + 16, ent.y + 16, 'WATER'));
                    }
                    else if(this.player.tool === ENUMS.TOOLS.POTION && ent.plant && ent.plant.state !== ENUMS.PLANT_STATE.MATURE) {
                        if((this.player.inventory['POTION_GROWTH'] || 0) > 0) {
                            ent.plant.growth = 100; ent.plant.state = ENUMS.PLANT_STATE.MATURE;
                            this.player.inventory['POTION_GROWTH']--;
                            UIController.notify("Poción usada");
                        } else { UIController.notify("No tienes Pociones", true); }
                    }
                    else if(this.player.tool === ENUMS.TOOLS.FERTILIZER) {
                        if((this.player.inventory['SUPER_FERTILIZER'] || 0) > 0) {
                            ent.water = 99999; 
                            this.player.inventory['SUPER_FERTILIZER']--;
                            for(let i=0; i<12; i++) this.particles.push(new Particle(ent.x + 16, ent.y + 16, 'WATER'));
                            UIController.notify("Tierra super fertilizada");
                        } else { UIController.notify("No tienes Fertilizante", true); }
                    }
                    else if(this.player.tool === ENUMS.TOOLS.GOLD && ent.plant?.state === ENUMS.PLANT_STATE.MATURE) {
                        if((this.player.inventory['GOLD_TRANSMUTE'] || 0) > 0) {
                            this.player.money += 350;
                            this.player.inventory['GOLD_TRANSMUTE']--;
                            ent.plant = null; 
                            ent.tilled = false; 
                            for(let i=0; i<15; i++) this.particles.push(new Particle(ent.x + 16, ent.y + 16, 'GOLD'));
                            UIController.notify("Transmutación Exitosa: +350 F");
                        } else { UIController.notify("No tienes Transmutación de Oro", true); }
                    }
                    else if(this.player.tool === ENUMS.TOOLS.HAND && ent.plant?.state === ENUMS.PLANT_STATE.MATURE) {
                        const pData = ent.plant.data;
                        this.player.money += pData.price; this.player.xp += pData.xp;
                        this.player.inventory[pData.id] = (this.player.inventory[pData.id] || 0) + 1;
                        
                        if(this.world.currentQuest.plantId === pData.id) {
                            this.world.currentQuest.currentQty++;
                            if(this.world.currentQuest.currentQty >= this.world.currentQuest.targetQty) {
                                this.player.money += this.world.currentQuest.reward; this.player.xp += 100;
                                UIController.notify(`CONTRATO COMPLETADO: +${this.world.currentQuest.reward} F`); this.generateQuest();
                            }
                        }
                        ent.plant = null; ent.tilled = false; this.checkLevelUp();
                        UIController.notify(`Cosechado: ${pData.name}`);
                    }
                }
            }
        });
        this.world.entities = this.world.entities.filter(e => !e.toDelete);
        UIController.updateHUD();
    }

    craft(recipeId) {
        const recipe = DB.RECIPES[recipeId];
        let canCraft = true;
        for(let reqId in recipe.req) { if((this.player.inventory[reqId] || 0) < recipe.req[reqId]) canCraft = false; }
        
        if(canCraft) {
            for(let reqId in recipe.req) { this.player.inventory[reqId] -= recipe.req[reqId]; }
            this.player.inventory[recipeId] = (this.player.inventory[recipeId] || 0) + 1;
            UIController.notify(`Fabricado: ${recipe.name}`);
            UIController.renderCraftingUI(); UIController.updateHUD();
        }
    }

    buy(itemId) {
        const item = DB.SHOP[itemId];
        if (this.player.money >= item.price) {
            this.player.money -= item.price;
            this.player.inventory[itemId] = (this.player.inventory[itemId] || 0) + item.qty;
            UIController.notify(`Comprado: ${item.name}`);
            UIController.updateHUD();
        } else {
            UIController.notify(`Faltan Florins`, true);
        }
    }

    togglePlacement(itemId) {
        if (this.placementItem === itemId) {
            this.placementItem = null; 
            this.placementRotation = 0;
        } else {
            this.placementItem = itemId; 
            this.placementRotation = 0;
            this.selectedPlot = null;
            UIController.notify(itemId === 'FENCE' ? "Construcción. Presiona [R] para rotar." : "Modo Construcción Activo.");
        }
        UIController.updateHUD();
    }

    placeStructure() {
        if ((this.player.inventory[this.placementItem] || 0) <= 0) {
            this.placementItem = null;
            UIController.updateHUD();
            return;
        }

        const cam = this.world.camera;
        const wx = this.mouseX + cam.x;
        const wy = this.mouseY + cam.y;
        
        const gx = Math.floor(wx / 32) * 32;
        const gy = Math.floor(wy / 32) * 32;

        const occupied = this.world.entities.some(e => {
            return Math.abs(e.x - gx) < 24 && Math.abs(e.y - gy) < 24; 
        });

        if (!occupied) {
            this.player.inventory[this.placementItem]--;
            
            if (this.placementItem === 'PLOT') {
                this.world.entities.push(new Plot(gx, gy));
                for(let i=0; i<8; i++) this.particles.push(new Particle(gx + 16, gy + 16, 'DIRT'));
            } else if (this.placementItem === 'FENCE') {
                this.world.entities.push(new Fence(gx, gy, this.placementRotation || 0));
            }
            
            UIController.notify("Estructura colocada");
            
            if (this.player.inventory[this.placementItem] <= 0) {
                this.placementItem = null; 
            }
            UIController.updateHUD();
        } else {
            UIController.notify("Espacio bloqueado", true);
        }
    }

    update(dt) {
        if(this.scene !== ENUMS.SCENE.PLAY) {
            if(this.scene === ENUMS.SCENE.MENU) { this.world.camera.x += 0.4; if(this.world.camera.x > 800) this.world.camera.x = 0; }
            return;
        }
        
        let ax=0, ay=0;
        if(this.inputs['w']) ay -= 0.8; if(this.inputs['s']) ay += 0.8;
        if(this.inputs['a']) ax -= 0.8; if(this.inputs['d']) ax += 0.8;
        this.player.vx = (this.player.vx + ax) * 0.82; this.player.vy = (this.player.vy + ay) * 0.82;
        
        let nextX = this.player.x + this.player.vx;
        let nextY = this.player.y + this.player.vy;

        for (let e of this.world.entities) {
            if (e.type === 'FENCE') {
                if (nextX < e.x + 32 && nextX + 32 > e.x && this.player.y < e.y + 32 && this.player.y + 32 > e.y) {
                    this.player.vx = 0; 
                    nextX = this.player.x;
                }
                if (this.player.x < e.x + 32 && this.player.x + 32 > e.x && nextY < e.y + 32 && nextY + 32 > e.y) {
                    this.player.vy = 0; 
                    nextY = this.player.y;
                }
            }
        }

        this.player.x = Math.max(0, Math.min(this.world.width-32, nextX));
        this.player.y = Math.max(0, Math.min(this.world.height-32, nextY));

        this.world.camera.x += (this.player.x - 400 - this.world.camera.x) * 0.1;
        this.world.camera.y += (this.player.y - 300 - this.world.camera.y) * 0.1;

        this.world.timeElapsed += dt * 150; // TIEMPO MÁS LENTO: 1 segundo real = 2.5 minutos de juego
        if(this.world.timeElapsed >= 86400000) { this.world.timeElapsed = 0; this.world.day++; }
        
        const h = Math.floor(this.world.timeElapsed / 3600000) % 24, m = Math.floor((this.world.timeElapsed % 3600000) / 60000);
        const timeUI = document.getElementById('ui-time');
        if (timeUI) timeUI.innerText = `DÍA ${this.world.day} - ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        
        if(Math.random() < 0.003) {
            const keys = Object.keys(DB.PLANTS); this.world.entities.push(new SeedDrop(Math.random()*1500, Math.random()*1100, keys[Math.floor(Math.random()*keys.length)]));
        }
        this.world.entities.forEach(e => e.update(dt)); 
        
        this.particles.forEach(p => p.update(dt));
        this.particles = this.particles.filter(p => p.life > 0);
    }

    draw() {
        const ctx = this.ctx, cam = this.world.camera;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,800,600);
        
        // DIBUJAR CESPED
        for(let i=0; i<1600; i+=32) for(let j=0; j<1200; j+=32) {
            if(i > cam.x-32 && i < cam.x+800 && j > cam.y-32 && j < cam.y+600) ctx.drawImage(this.lib.get('grass'), i-cam.x, j-cam.y);
        }

        // DIBUJAR CAPA BASE: Solo las Parcelas de tierra (Para que el jugador camine siempre por arriba)
        this.world.entities.forEach(e => {
            if(e.type === 'PLOT') e.draw(ctx, this.lib, cam);
        });

        // PREPARAR CAPA CON Y-SORT: Entidades con profundidad
        const items = []; 
        if(this.scene === ENUMS.SCENE.PLAY) items.push({ ...this.player, type: 'PLAYER' });
        
        this.world.entities.forEach(e => {
            if(e.type !== 'PLOT') items.push(e); // Agregar Vallas, Tienda, Mesa, Semillas
            if(e.type === 'PLOT' && e.plant) {
                // Agregar las plantas como un objeto falso para que se ordenen junto con el jugador
                items.push({ type: 'PLANT_WRAPPER', y: e.y, plot: e });
            }
        });

        // ORDENAR Y DIBUJAR ENTIDADES (Jugador vs Plantas, etc)
        items.sort((a,b)=>a.y-b.y).forEach(obj => {
            if(obj.type === 'PLAYER') ctx.drawImage(this.lib.get('player'), obj.x-cam.x, obj.y-cam.y-12);
            else if(obj.type === 'PLANT_WRAPPER') obj.plot.plant.draw(ctx, this.lib, cam, obj.plot.x, obj.plot.y);
            else obj.draw(ctx, this.lib, cam);
        });

        this.particles.forEach(p => p.draw(ctx, cam));

        const wx = this.mouseX + cam.x;
        const wy = this.mouseY + cam.y;

        // Efecto Hover de Parcela o Valla (Contorno Amarillo)
        if (!this.placementItem && !this.isDraggingPlot) {
            for (let i = this.world.entities.length - 1; i >= 0; i--) {
                const ent = this.world.entities[i];
                if ((ent.type === 'PLOT' || ent.type === 'FENCE') && wx >= ent.x && wx < ent.x + 32 && wy >= ent.y && wy < ent.y + 32) {
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ent.x - cam.x, ent.y - cam.y, 32, 32);
                    break;
                }
            }
        }

        // Interfaz de Parcela/Valla Seleccionada
        if (this.selectedPlot && this.scene === ENUMS.SCENE.PLAY) {
            ctx.strokeStyle = '#4CAF50'; 
            ctx.lineWidth = 2;
            ctx.strokeRect(this.selectedPlot.x - cam.x, this.selectedPlot.y - cam.y, 32, 32);

            const px = this.selectedPlot.x - cam.x;
            const py = this.selectedPlot.y - cam.y;
            
            // Botón Mover (Azul)
            ctx.fillStyle = '#2196F3'; ctx.fillRect(px, py - 20, 16, 16);
            ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
            ctx.fillText('M', px + 4, py - 7);

            // Botón Borrar (Rojo)
            ctx.fillStyle = '#f44336'; ctx.fillRect(px + 16, py - 20, 16, 16);
            ctx.fillStyle = '#fff';
            ctx.fillText('X', px + 20, py - 7);
        }

        // --- SISTEMA DE DÍA Y NOCHE ---
        const currentHour = this.world.timeElapsed / 3600000;
        let r = 0, g = 0, b = 40, a = 0;

        if (currentHour >= 20.0 && currentHour < 22.0) {
            // Atardecer (20:00 a 22:00) - 2 horas de transición
            let p = (currentHour - 20.0) / 2.0;
            r = 180 * (1 - p); 
            g = 80 * (1 - p);
            b = 40 + 80 * p;
            a = 0.45 * p;
        } else if (currentHour >= 22.0 || currentHour < 4.0) {
            // Noche (22:00 a 04:00) - Noche corta (6 horas)
            r = 0; g = 0; b = 120; a = 0.45;
        } else if (currentHour >= 4.0 && currentHour < 6.0) {
            // Amanecer (04:00 a 06:00) - 2 horas de transición
            let p = (currentHour - 4.0) / 2.0;
            r = 180 * p; 
            g = 80 * p;
            b = 120 - 80 * p;
            a = 0.45 * (1 - p);
        }

        if (a > 0) {
            ctx.fillStyle = `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, ${a})`;
            ctx.fillRect(0, 0, 800, 600);
        }
        // ------------------------------

        // Dibujar el Fantasma del Modo Construcción
        if (this.placementItem && this.scene === ENUMS.SCENE.PLAY) {
            const gx = Math.floor(wx / 32) * 32;
            const gy = Math.floor(wy / 32) * 32;
            
            ctx.globalAlpha = 0.6;
            if (this.placementItem === 'PLOT') ctx.drawImage(this.lib.get('dirt_dry'), gx - cam.x, gy - cam.y);
            if (this.placementItem === 'FENCE') {
                ctx.save();
                ctx.translate(gx - cam.x + 16, gy - cam.y + 16);
                ctx.rotate((this.placementRotation * 90) * Math.PI / 180);
                ctx.drawImage(this.lib.get('fence'), -16, -16);
                ctx.restore();
            }
            ctx.globalAlpha = 1.0;
            
            ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
            ctx.strokeRect(gx - cam.x, gy - cam.y, 32, 32);
        }
    }

    loop(t) { const dt = t - (this.lastTime || t); this.lastTime = t; this.update(dt); this.draw(); requestAnimationFrame(n => this.loop(n)); }
    pauseGame() { this.scene = ENUMS.SCENE.PAUSE; document.getElementById('pause-menu').style.display = 'flex'; }
    resumeGame() { this.scene = ENUMS.SCENE.PLAY; document.getElementById('pause-menu').style.display = 'none'; }
    saveAndExit() { SaveManager.saveGame(this.currentSlot, this); location.reload(); }
}

class UIController {
    static renderSaveSlots() {
        const container = document.getElementById('save-slots-container');
        container.innerHTML = '';
        for(let i=1; i<=3; i++) {
            const d = SaveManager.getSave(i); const slot = document.createElement('div'); slot.className = 'save-slot'; slot.onclick = () => Game.loadSave(i);
            slot.innerHTML = d ? `<div class="slot-title">JUEGO ${i}</div><div>LVL ${d.player.level}</div><div>${d.player.money} F</div><button class="btn-delete" onclick="SaveManager.deleteSave(${i}, event)">BORRAR</button>` : `<div class="slot-title">JUEGO ${i}</div><div style="color:#666">VACÍO</div>`;
            container.appendChild(slot);
        }
    }
    static updateHUD() {
        if(Game.scene !== ENUMS.SCENE.PLAY && Game.scene !== ENUMS.SCENE.CRAFTING && Game.scene !== ENUMS.SCENE.SHOP) return;
        const p = Game.player, w = Game.world;
        document.getElementById('ui-lvl').innerText = p.level;
        document.getElementById('ui-money').innerText = p.money;
        document.getElementById('ui-tool').innerText = p.tool;
        document.getElementById('xp-fill').style.width = `${(p.xp/(p.level * 150))*100}%`;
        document.getElementById('ui-xp-text').innerText = `${p.xp}/${p.level * 150} XP`;
        
        const q = w.currentQuest;
        document.getElementById('quest-info').innerText = `${DB.PLANTS[q.plantId].name}: ${q.currentQty}/${q.targetQty}`;
        
        this.renderInventory();
    }
    
    static renderInventory() {
        const bar = document.getElementById('inventory-bar');
        bar.innerHTML = '';
        const inv = Game.player.inventory;
        
        bar.innerHTML += `<div class="inv-slot" style="color:#fff"><div class="label">Semillas Silvestres</div>S<div class="count">${Game.player.seeds}</div></div>`;
        
        for(let id in inv) {
            if(inv[id] > 0) {
                let color = '#fff', text = id.substring(0,2), name = "Objeto";
                
                if(DB.PLANTS[id]) { color = DB.PLANTS[id].color; name = DB.PLANTS[id].name; }
                else if(DB.RECIPES[id]) { 
                    color = id === 'GOLD_TRANSMUTE' ? '#FFD700' : '#4caf50'; 
                    text = id === 'POTION_GROWTH' ? 'Poc' : (id === 'GOLD_TRANSMUTE' ? 'Oro' : 'Fer'); 
                    name = DB.RECIPES[id].name;
                }
                else if(id === 'PLOT') { color = '#8d6e63'; text = 'Par'; name = 'Parcela'; }
                else if(id === 'FENCE') { color = '#d7ccc8'; text = 'Val'; name = 'Valla'; }

                let extraStyle = "";
                let onclickEvent = "";

                if (id === 'PLOT' || id === 'FENCE') {
                    extraStyle = "cursor: pointer;";
                    onclickEvent = `onclick="Game.togglePlacement('${id}')"`;
                    if (Game.placementItem === id) {
                        extraStyle += " border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); background: rgba(255,215,0,0.2);";
                    }
                }
                
                bar.innerHTML += `<div class="inv-slot" style="color:${color}; border-color:${color}; ${extraStyle}" ${onclickEvent}><div class="label">${name}</div>${text}<div class="count">${inv[id]}</div></div>`;
            }
        }
    }

    static openCrafting() {
        Game.scene = ENUMS.SCENE.CRAFTING;
        document.getElementById('crafting-menu').style.display = 'flex';
        this.renderCraftingUI();
    }
    
    static closeCrafting() {
        Game.scene = ENUMS.SCENE.PLAY;
        document.getElementById('crafting-menu').style.display = 'none';
    }

    static openShop() {
        Game.scene = ENUMS.SCENE.SHOP;
        document.getElementById('shop-menu').style.display = 'flex';
        this.renderShopUI();
    }

    static closeShop() {
        Game.scene = ENUMS.SCENE.PLAY;
        document.getElementById('shop-menu').style.display = 'none';
    }

    static renderCraftingUI() {
        const list = document.getElementById('recipes-list');
        list.innerHTML = '';
        const inv = Game.player.inventory;

        for(let key in DB.RECIPES) {
            const recipe = DB.RECIPES[key];
            let reqHtml = '', canCraft = true;
            
            for(let reqId in recipe.req) {
                const has = inv[reqId] || 0;
                const need = recipe.req[reqId];
                const color = has >= need ? '#2e7d32' : '#d84315';
                reqHtml += `<span style="color:${color}">${DB.PLANTS[reqId].name} (${has}/${need})</span> | `;
                if(has < need) canCraft = false;
            }

            list.innerHTML += `
                <div class="recipe-card">
                    <div class="recipe-info">
                        <h3>${recipe.name}</h3>
                        <p>${recipe.desc}</p>
                        <div class="recipe-req">${reqHtml.slice(0,-2)}</div>
                    </div>
                    <button class="btn-craft" ${canCraft ? '' : 'disabled'} onclick="Game.craft('${recipe.id}')">FABRICAR</button>
                </div>
            `;
        }
    }

    static renderShopUI() {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        
        for(let key in DB.SHOP) {
            const item = DB.SHOP[key];
            const canBuy = Game.player.money >= item.price;

            list.innerHTML += `
                <div class="recipe-card" style="border-color: #ffd54f;">
                    <div class="recipe-info">
                        <h3 style="color: #f57f17;">${item.name}</h3>
                        <p>${item.desc}</p>
                        <div class="recipe-req" style="color: #d84315;">Costo: ${item.price} F</div>
                    </div>
                    <button class="btn-craft" style="background: ${canBuy ? '#FFD700' : '#ccc'}; border-color: ${canBuy ? '#b8860b' : '#999'}; color: ${canBuy ? '#000' : '#666'};" ${canBuy ? '' : 'disabled'} onclick="Game.buy('${item.id}')">COMPRAR</button>
                </div>
            `;
        }
    }

    static notify(txt, isError = false) {
        const n = document.createElement('div'); n.innerText = txt; n.style.color = isError ? "#ff5252" : "#FFD700";
        document.getElementById('notifications').appendChild(n); setTimeout(() => n.remove(), 3000);
    }
}

const Game = new Engine();
</script>
</body>
